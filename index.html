<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEN-MFB - Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Montserrat:wght@800&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- Reset & Base Styles --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            padding: 0 20px 40px 20px;
            color: #555e71;
            
            /* High-fidelity mesh gradient background mimicking the original canvas */
            background-color: #f8faff;
            background-image: 
                radial-gradient(at 0% 15%, rgba(223, 191, 243, 0.4) 0px, transparent 40%),
                radial-gradient(at 100% 100%, rgba(254, 212, 171, 0.5) 0px, transparent 35%),
                radial-gradient(at 85% 85%, rgba(212, 227, 253, 0.5) 0px, transparent 40%);
        }

        /* --- Header (Top Notch Container) --- */
        header {
            position: relative;
            background: #ffffff;
            padding: 12px 45px;
            border-bottom-left-radius: 28px;
            border-bottom-right-radius: 28px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* Smooth pseudo-element curves to create the seamless 'notch' blend */
        header::before, header::after {
            content: '';
            position: absolute;
            top: 0;
            width: 25px;
            height: 25px;
            background: transparent;
        }
        header::before {
            left: -25px;
            border-top-right-radius: 25px;
            box-shadow: 6px -6px 0 6px #ffffff;
        }
        header::after {
            right: -25px;
            border-top-left-radius: 25px;
            box-shadow: -6px -6px 0 6px #ffffff;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            background: #1e40af;
            color: #ffffff;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transform: rotate(-45deg);
        }

        .logo-text {
            font-family: 'Pacifico', ;
            font-size: 18px;
            color: #111827;
        }

        /* --- Main Content Section --- */
        main {
            text-align: center;
            max-width: 650px;
            margin: auto;
            position: relative;
            z-index: 5;
        }

        .emoji-container {
            font-size: 42px;
            margin-bottom: 16px;
            display: inline-block;
        }

        .sub-badge {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 46px;
            font-weight: 800;
            color: #1d4ed8;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        .description {
            font-size: 16px;
            color: #64748b;
            line-height: 1.7;
            margin-bottom: 36px;
            font-weight: 400;
        }
        
        .description span {
            display: block;
        }

        /* Call To Action Button */
        .cta-btn {
            background-color: #0f1123;
            color: #ffffff;
            border: none;
            padding: 14px 28px 14px 16px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            border-radius: 50px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 10px 25px rgba(15, 17, 35, 0.25);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(15, 17, 35, 0.35);
        }

        .btn-icon {
            background: #ffffff;
            color: #0f1123;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
        }

        .btn-text {
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.3px;
        }

        /* --- Footer (Social Links) --- */
        footer {
            display: flex;
            gap: 16px;
            z-index: 10;
        }

        .social-icon {
            width: 36px;
            height: 36px;
            background: #ffffff;
            color: #94a3b8;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
            transition: all 0.2s ease;
        }

        .social-icon:hover {
            color: #1d4ed8;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.07);
            transform: translateY(-1px);
        }

        /* --- Abstract 3D Floating Shapes --- */
        /* Recreated with pure CSS vectors to avoid broken external image links */
        .shape {
            position: absolute;
            pointer-events: none;
        }

        /* Green crescent shape on the left */
        .shape-left {
            left: 15%;
            top: 60%;
            width: 35px;
            height: 35px;
            border: 8px solid #7fa99b;
            border-right-color: transparent;
            border-bottom-color: transparent;
            border-radius: 50%;
            transform: rotate(-30deg);
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.06));
        }

        /* Gold zigzag/ribbon shape on the right */
        .shape-right {
            right: 18%;
            top: 62%;
            width: 25px;
            height: 50px;
            background: repeating-linear-gradient(
                45deg,
                #dca869,
                #dca869 4px,
                transparent 4px,
                transparent 8px
            );
            opacity: 0.8;
            transform: rotate(15deg);
        }

        /* Bottom right corner gold abstract element */
        .shape-corner {
            bottom: -20px;
            right: -20px;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle at center, #f5bc7a 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0.6;
            filter: blur(10px);
        }

        /* --- Responsive Tweaks --- */
        @media (max-width: 768px) {
            h1 {
                font-size: 34px;
            }
            .shape-left, .shape-right {
                display: none; /* Keeps mobile view clean */
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <div class="logo-icon">
                <i class="fa-solid fa-link"></i>
            </div>
            <span class="logo-text">Jen Microfinance Bank</span>
        </div>
    </header>

    <main>
        <div class="sub-badge">We're </div>
        <h1>Coming soon.</h1>
        <p class="description">
            We are currently preparing our official platform.
            A refined banking experience will be available shortly.
            <span>Stay Tune.</span>
        </p>
        
        <button class="cta-btn">
            <span class="btn-icon">
                <i class="fa-regular fa-envelope"></i>
            </span>
            <span class="btn-text">Notify Me <i class="fa-solid fa-chevron-right" style="font-size: 10px;"></i></span>
        </button>
    </main>

    <div class="shape shape-left"></div>
    <div class="shape shape-right"></div>
    <div class="shape shape-corner"></div>

    <footer>
        <a href="#" class="social-icon" aria-label="Website"><i class="fa-solid fa-globe"></i></a>
        <a href="#" class="social-icon" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
        <a href="#" class="social-icon" aria-label="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
    </footer>

</body>
</html>
